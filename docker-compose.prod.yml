# ===========================================
# STS - Production Environment
# ===========================================
# 使用 Supabase + Nginx + SSL
# 啟動: docker compose -f docker-compose.prod.yml up -d

services:
  # ===========================================
  # Nginx Reverse Proxy (Production)
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: sts-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - sts-prod

  # ===========================================
  # Backend API (Production)
  # ===========================================
  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
      target: production
    container_name: sts-backend-prod
    restart: always
    env_file:
      - .env.prod
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sts-prod
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ===========================================
  # Frontend (Production - Static Build)
  # ===========================================
  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
      target: production
    container_name: sts-frontend-prod
    restart: always
    env_file:
      - .env.prod
    ports:
      - "3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sts-prod
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

networks:
  sts-prod:
    driver: bridge
