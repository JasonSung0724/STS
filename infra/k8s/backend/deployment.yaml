apiVersion: apps/v1
kind: Deployment
metadata:
  name: sts-backend
  namespace: sts
  labels:
    app: sts-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sts-backend
  template:
    metadata:
      labels:
        app: sts-backend
    spec:
      containers:
        - name: backend
          image: gcr.io/PROJECT_ID/sts-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sts-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sts-secrets
                  key: jwt-secret
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sts-secrets
                  key: openai-api-key
            - name: CORS_ORIGINS
              value: '["https://your-domain.com"]'
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sts-backend
  namespace: sts
spec:
  selector:
    app: sts-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
