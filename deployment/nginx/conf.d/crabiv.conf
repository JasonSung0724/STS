# ===========================================
# Crabiv Restaurant Website
# ===========================================
# Domain: kingcrab-crabiv.com
# Container: crabiv:3000 (on sts-network)
#
# 此檔案由 STS repo 統一管理
# STS 的 Nginx 是共用反向代理，所有站點的 config 都在這裡

# ===========================================
# HTTPS Server
# ===========================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kingcrab-crabiv.com www.kingcrab-crabiv.com;

    ssl_certificate /etc/letsencrypt/live/kingcrab-crabiv.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kingcrab-crabiv.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    client_max_body_size 10M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_comp_level 6;

    location / {
        limit_req zone=general_limit burst=50 nodelay;
        set $crabiv crabiv:3000;
        proxy_pass http://$crabiv;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }

    location /_next/static/ {
        set $crabiv crabiv:3000;
        proxy_pass http://$crabiv;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

# ===========================================
# HTTP → HTTPS Redirect
# ===========================================
server {
    listen 80;
    listen [::]:80;
    server_name kingcrab-crabiv.com www.kingcrab-crabiv.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
