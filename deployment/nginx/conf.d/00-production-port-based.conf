# ===========================================
# STS Production - Port-based Architecture
# ===========================================
# For use without domain names
# Marketing site: http://VM_IP:8084/
# App platform: http://VM_IP:8081/
# Crabiv: https://kingcrab-crabiv.com (port 80/443)
#
# Replace with production-subdomain.conf when domains are available

# ===========================================
# Marketing Site - Port 8084
# ===========================================
server {
    listen 8084;
    listen [::]:8084;
    server_name _;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    client_max_body_size 10M;

    location = / {
        limit_req zone=general_limit burst=50 nodelay;
        set $frontend_prod sts-frontend-prod:3000;
        rewrite ^ /landing break;
        proxy_pass http://$frontend_prod;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(landing|about|insights|contact|offices|privacy|terms)(/.*)?$ {
        limit_req zone=general_limit burst=50 nodelay;
        set $frontend_prod sts-frontend-prod:3000;
        proxy_pass http://$frontend_prod;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /_next/ {
        set $frontend_prod sts-frontend-prod:3000;
        proxy_pass http://$frontend_prod;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        return 200 "STS Marketing Site\nFor app platform: http://$host:8081/\n";
        add_header Content-Type text/plain;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

# ===========================================
# App Platform - Port 8081
# ===========================================
server {
    listen 8081;
    listen [::]:8081;
    server_name _;

    client_max_body_size 10M;

    # API Routes
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        set $backend_prod sts-backend-prod:8000;
        proxy_pass http://$backend_prod$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # Health check
    location /health {
        set $backend_prod sts-backend-prod:8000;
        proxy_pass http://$backend_prod/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # API Documentation
    location ~ ^/(docs|openapi.json|redoc)$ {
        set $backend_prod sts-backend-prod:8000;
        proxy_pass http://$backend_prod$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = / {
        return 302 /dashboard;
    }
    location ~ ^/(login|register|dashboard|admin|chat|analytics|articles|settings|war-room|onboarding|auth)(/.*)?$ {
        limit_req zone=general_limit burst=50 nodelay;
        set $frontend_prod sts-frontend-prod:3000;
        proxy_pass http://$frontend_prod;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Next.js 静态文件
    location /_next/ {
        set $frontend_prod sts-frontend-prod:3000;
        proxy_pass http://$frontend_prod;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Fallback to frontend
    location / {
        limit_req zone=general_limit burst=50 nodelay;
        set $frontend_prod sts-frontend-prod:3000;
        proxy_pass http://$frontend_prod;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
