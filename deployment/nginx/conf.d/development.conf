# ===========================================
# STS Development Nginx Configuration
# ===========================================
# Port-based architecture (no domain)
# Marketing site: http://VM_IP:8080/
# App platform: http://VM_IP:8082/
# API docs: http://VM_IP:8082/docs

# ===========================================
# Marketing Site - Port 8080
# ===========================================
server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    client_max_body_size 10M;

    location = / {
        limit_req zone=general_limit burst=100 nodelay;
        set $frontend_dev frontend-dev:3000;
        rewrite ^ /landing break;
        proxy_pass http://$frontend_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(landing|about|insights|contact|offices|privacy|terms)(/.*)?$ {
        limit_req zone=general_limit burst=100 nodelay;
        set $frontend_dev frontend-dev:3000;
        proxy_pass http://$frontend_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    location /_next/static/ {
        set $frontend_dev frontend-dev:3000;
        proxy_pass http://$frontend_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1h;
    }

    location /_next/webpack-hmr {
        set $frontend_dev frontend-dev:3000;
        proxy_pass http://$frontend_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location / {
        return 200 "STS Marketing Site (Development)\nFor app platform: http://$host:8082/\n";
        add_header Content-Type text/plain;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

# ===========================================
# App Platform - Port 8082
# ===========================================
server {
    listen 8082;
    listen [::]:8082;
    server_name _;

    client_max_body_size 10M;

    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        set $backend_dev backend-dev:8000;
        proxy_pass http://$backend_dev$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    location /health {
        set $backend_dev backend-dev:8000;
        proxy_pass http://$backend_dev/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location ~ ^/(docs|openapi.json|redoc)$ {
        set $backend_dev backend-dev:8000;
        proxy_pass http://$backend_dev$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = / {
        return 302 /dashboard;
    }

    location ~ ^/(login|register|dashboard|admin|chat|analytics|articles|settings|war-room|onboarding|auth)(/.*)?$ {
        limit_req zone=general_limit burst=100 nodelay;
        set $frontend_dev frontend-dev:3000;
        proxy_pass http://$frontend_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    location /_next/ {
        set $frontend_dev frontend-dev:3000;
        proxy_pass http://$frontend_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1h;
    }

    location /_next/webpack-hmr {
        set $frontend_dev frontend-dev:3000;
        proxy_pass http://$frontend_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location / {
        limit_req zone=general_limit burst=100 nodelay;
        set $frontend_dev frontend-dev:3000;
        proxy_pass http://$frontend_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

