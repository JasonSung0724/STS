# ===========================================
# STS Development Nginx Configuration
# ===========================================
# 網域: dev.sts.yourdomain.com (設定後替換)
# 端口: 8080 (HTTP), 8443 (HTTPS)
#
# 無網域時的訪問方式:
# - Frontend: http://VM_IP:8080/
# - Backend API: http://VM_IP:8080/api/
# - API Docs: http://VM_IP:8080/docs

# ===========================================
# HTTP Server (Development) - Port 8080
# ===========================================
server {
    listen 8080;
    listen [::]:8080;
    # 替換為你的網域，例如: dev.sts.example.com
    server_name _;  # 預設接受所有請求

    # Let's Encrypt challenge (SSL 憑證驗證用)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Client body size limit
    client_max_body_size 10M;

    # ===========================================
    # API Routes -> Backend (Development)
    # ===========================================
    location /api/ {
        # Development 環境放寬 rate limit
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://dev_backend/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://dev_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # API Documentation (Swagger UI)
    location /docs {
        proxy_pass http://dev_backend/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://dev_backend/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://dev_backend/redoc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ===========================================
    # Frontend Routes -> Next.js (Development)
    # ===========================================
    location / {
        limit_req zone=general_limit burst=100 nodelay;

        proxy_pass http://dev_frontend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Hot reload support
        proxy_read_timeout 86400;
    }

    # Next.js hot reload (HMR)
    location /_next/webpack-hmr {
        proxy_pass http://dev_frontend/_next/webpack-hmr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Static files
    location /_next/static/ {
        proxy_pass http://dev_frontend/_next/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # Development 不啟用長期快取
        expires 1h;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

