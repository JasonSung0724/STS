# ===========================================
# STS Production Nginx Configuration
# ===========================================
# 雙網域架構:
#   - sts.tw (或你的網域) → 行銷頁面 (Marketing/Landing)
#   - app.sts.tw → 後台系統 (Dashboard/Admin)
#
# 設定方式:
#   1. 替換 YOUR_DOMAIN 為你的實際網域
#   2. 執行 certbot 取得 SSL 憑證
#   3. 取消註解 HTTPS server blocks

# ===========================================
# HTTP → HTTPS 重導向 (啟用 SSL 後使用)
# ===========================================
# server {
#     listen 80;
#     listen [::]:80;
#     server_name sts.tw www.sts.tw app.sts.tw;
#
#     location /.well-known/acme-challenge/ {
#         root /var/www/certbot;
#     }
#
#     location / {
#         return 301 https://$host$request_uri;
#     }
# }

# ===========================================
# 行銷網站 - sts.tw (Marketing/Landing)
# ===========================================
server {
    listen 80;
    listen [::]:80;
    server_name _;  # 預設接受所有請求（無網域時使用）

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    client_max_body_size 10M;

    # ===========================================
    # 行銷頁面路由 (Marketing Routes)
    # ===========================================
    # Landing 首頁
    location = / {
        limit_req zone=general_limit burst=50 nodelay;
        set $frontend_prod sts-frontend-prod:3000;

        # 重寫到 /landing 路由
        rewrite ^ /landing break;
        proxy_pass http://$frontend_prod;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 行銷子頁面
    location ~ ^/(about|insights|contact|offices|privacy|terms)(/.*)?$ {
        limit_req zone=general_limit burst=50 nodelay;
        set $frontend_prod sts-frontend-prod:3000;
        proxy_pass http://$frontend_prod;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ===========================================
    # 後台系統路由 (Dashboard Routes)
    # 當使用單一網域時，後台在 /dashboard, /login 等路徑
    # ===========================================
    location ~ ^/(login|register|dashboard|admin|chat|analytics|articles|settings|war-room|onboarding|auth)(/.*)?$ {
        limit_req zone=general_limit burst=50 nodelay;
        set $frontend_prod sts-frontend-prod:3000;
        proxy_pass http://$frontend_prod;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ===========================================
    # API Routes -> Backend
    # ===========================================
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        set $backend_prod sts-backend-prod:8000;
        proxy_pass http://$backend_prod$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # Health check endpoint
    location /health {
        set $backend_prod sts-backend-prod:8000;
        proxy_pass http://$backend_prod/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # API Documentation
    location /docs {
        set $backend_prod sts-backend-prod:8000;
        proxy_pass http://$backend_prod/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        set $backend_prod sts-backend-prod:8000;
        proxy_pass http://$backend_prod/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ===========================================
    # Static files & Next.js assets
    # ===========================================
    location /_next/ {
        set $frontend_prod sts-frontend-prod:3000;
        proxy_pass http://$frontend_prod;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Fallback to frontend
    location / {
        limit_req zone=general_limit burst=50 nodelay;
        set $frontend_prod sts-frontend-prod:3000;
        proxy_pass http://$frontend_prod;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

