# ===========================================
# STS Production Nginx Configuration
# ===========================================
# 網域: sts.yourdomain.com (設定後替換)
# 端口: 80 (HTTP), 443 (HTTPS)
#
# 設定方式:
# 1. 替換 PROD_DOMAIN 為你的實際網域
# 2. 執行 certbot 取得 SSL 憑證
# 3. 取消註解 HTTPS server block

# ===========================================
# HTTP Server (Production)
# ===========================================
server {
    listen 80;
    listen [::]:80;
    # 替換為你的網域，例如: sts.example.com
    server_name _;  # 預設接受所有請求

    # Let's Encrypt challenge (SSL 憑證驗證用)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 當有 SSL 憑證後，取消下面註解來啟用 HTTPS 重導向
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # Client body size limit
    client_max_body_size 10M;

    # ===========================================
    # API Routes -> Backend (Production)
    # ===========================================
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        # 使用變數以支援動態 DNS 解析
        set $backend_prod backend-prod:8000;
        # 注意：使用變數時 proxy_pass 不會自動替換 URI
        # 需要使用 $request_uri 直接傳遞原始路徑
        proxy_pass http://$backend_prod$request_uri;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # Health check endpoint
    location /health {
        set $backend_prod backend-prod:8000;
        proxy_pass http://$backend_prod/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # API Documentation
    location /docs {
        set $backend_prod backend-prod:8000;
        proxy_pass http://$backend_prod/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        set $backend_prod backend-prod:8000;
        proxy_pass http://$backend_prod/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ===========================================
    # Frontend Routes -> Next.js (Production)
    # ===========================================
    location / {
        limit_req zone=general_limit burst=50 nodelay;

        set $frontend_prod frontend-prod:3000;
        proxy_pass http://$frontend_prod;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Static files caching
    location /_next/static/ {
        set $frontend_prod frontend-prod:3000;
        proxy_pass http://$frontend_prod;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

