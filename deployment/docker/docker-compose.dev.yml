# ===========================================
# STS - Development Environment (Supabase)
# ===========================================
# 使用 Supabase 雲端資料庫 + 本地 Redis
# 啟動: docker compose -f deployment/docker/docker-compose.dev.yml up -d

services:
  # ===========================================
  # Redis Cache (Local for Dev)
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: sts-redis-dev
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_dev:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sts-dev

  # ===========================================
  # Backend API (Development with Supabase)
  # ===========================================
  backend:
    build:
      context: ../..
      dockerfile: deployment/docker/backend.Dockerfile
    container_name: sts-backend-dev
    restart: unless-stopped
    env_file:
      - ../env/.env.dev
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../../backend:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - sts-dev

  # ===========================================
  # Frontend (Development)
  # ===========================================
  frontend:
    build:
      context: ../..
      dockerfile: deployment/docker/frontend.Dockerfile
    container_name: sts-frontend-dev
    restart: unless-stopped
    env_file:
      - ../env/.env.dev
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ../../frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    networks:
      - sts-dev

volumes:
  redis_data_dev:
    driver: local

networks:
  sts-dev:
    driver: bridge
