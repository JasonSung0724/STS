# ===========================================
# STS - Local Development Environment
# ===========================================
# 使用 Supabase CLI (本地) + Redis + Backend + Frontend
#
# 啟動順序:
# 1. 先啟動 Supabase: supabase start
# 2. 再啟動其他服務: docker compose -f deployment/docker/docker-compose.local.yml --env-file deployment/env/.env.local up -d
#
# 服務端點:
# - Frontend: http://localhost:3000
# - Backend API: http://localhost:8000
# - Supabase API: http://localhost:54321
# - Supabase Studio: http://localhost:54323
# - Supabase DB: postgresql://postgres:postgres@localhost:54322/postgres

services:
  # ===========================================
  # Redis Cache
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: sts-redis-local
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_local:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sts-local

  # ===========================================
  # STS Backend API
  # ===========================================
  backend:
    build:
      context: ../..
      dockerfile: deployment/docker/backend.Dockerfile
      target: development
    container_name: sts-backend-local
    restart: unless-stopped
    env_file:
      - ../env/.env.local
    environment:
      # 連接到 Supabase CLI 啟動的 PostgreSQL
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@host.docker.internal:54322/postgres
      - REDIS_URL=redis://redis:6379/0
      # Supabase API
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_PUBLIC_URL=http://localhost:54321
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../../backend:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - sts-local

  # ===========================================
  # STS Frontend
  # ===========================================
  frontend:
    build:
      context: ../..
      dockerfile: deployment/docker/frontend.Dockerfile
      target: development
    container_name: sts-frontend-local
    restart: unless-stopped
    env_file:
      - ../env/.env.local
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_SUPABASE_URL=http://localhost:54321
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ../../frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - sts-local

volumes:
  redis_data_local:
    driver: local
  frontend_node_modules:
    driver: local

networks:
  sts-local:
    driver: bridge
