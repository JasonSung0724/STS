apiVersion: apps/v1
kind: Deployment
metadata:
  name: sts-frontend
  namespace: sts
  labels:
    app: sts-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sts-frontend
  template:
    metadata:
      labels:
        app: sts-frontend
    spec:
      containers:
        - name: frontend
          image: gcr.io/PROJECT_ID/sts-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.your-domain.com"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sts-frontend
  namespace: sts
spec:
  selector:
    app: sts-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
